name: CI Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  rust-ui-browser:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: src/design/yarn.lock

      - name: Build UI
        run: |
          corepack enable
          yarn --cwd src/design install --frozen-lockfile
          yarn --cwd src/design build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust format
        run: cargo fmt -- --check

      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        run: RUSTFLAGS="-D warnings" cargo test --all-targets

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: cargo audit

