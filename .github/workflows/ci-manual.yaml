name: CI Checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  rust-ui-browser:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.15.0 --activate

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn --cwd src/design config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('src/design/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Build UI
        run: |
          yarn --cwd src/design install --immutable
          yarn --cwd src/design build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust format
        run: cargo fmt -- --check

      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests
        run: RUSTFLAGS="-D warnings" cargo test --all-targets

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: cargo audit

