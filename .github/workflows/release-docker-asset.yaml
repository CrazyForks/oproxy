name: Release Multi-Arch Docker Image

on:
  release:
    types: [published] # Triggers when you hit "Publish" on a new release
  workflow_dispatch:

jobs:
  build-and-push-ghcr:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write # Grants permission to push to the registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The running binary reports CARGO_PKG_VERSION; the in-app update check
      # compares it to the latest GitHub release tag. If Cargo.toml is not bumped
      # to match the tag being released, every build of this release would report
      # "update available" against itself. Fail the release early when they drift.
      - name: Verify Cargo.toml version matches release tag
        if: github.event_name == 'release'
        run: |
          tag="${{ github.event.release.tag_name }}"
          tag="${tag#v}"
          cargo_ver="$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -n1)"
          echo "release tag: $tag | Cargo.toml version: $cargo_ver"
          if [ "$tag" != "$cargo_ver" ]; then
            echo "::error::Release tag '$tag' does not match Cargo.toml version '$cargo_ver'. Bump the version in Cargo.toml to $tag before publishing the release."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.15.0 --activate

      - name: Build UI
        run: |
          yarn --cwd src/design install --immutable
          yarn --cwd src/design build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust tests
        run: RUSTFLAGS="-D warnings" cargo test

      - name: Runtime asset sanity
        run: |
          test -f src/design/dist/index.html
          test -f src/design/dist/assets/app.js
          test -f src/design/dist/assets/app.css
          ! grep -R "text/babel\\|unpkg\\|cdn.jsdelivr\\|fonts.googleapis\\|fonts.gstatic" src/design/dist src/management.rs
          ! grep -R "Trust status\\|oproxy probes the OS keychain\\|Command palette\\|command palette\\|Save session log\\|Pause / resume recording" src/design/dist

      - name: Resolve image tag
        id: image
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            {
              echo "tags<<EOF"
              echo "ghcr.io/${{ github.repository_owner }}/oproxy:${{ github.event.release.tag_name }}"
              echo "ghcr.io/${{ github.repository_owner }}/oproxy:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/oproxy:manual-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      # Installs the emulator needed to build Apple Silicon (arm64) code on an Ubuntu runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Activates the advanced multi-arch builder
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Silently logs into the free GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the image for both chips and pushes it live
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
