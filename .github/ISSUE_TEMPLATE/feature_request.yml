name: 🚀 Feature Request / Proposal
description: Suggest an idea or propose a feature (like adding support for new protocols!)
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a feature request or protocol support proposal (e.g., Redis, SOCKS5 upgrades, etc.)? Tell us about it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem/limitation is. E.g., "I'm frustrated when [...]"
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: I would like oproxy to support the Redis protocol by...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or links about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Checklist
      description: Please check the following before submitting.
      options:
        - label: I have searched the existing issues and pull requests to ensure this feature hasn't been proposed already.
          required: true
