response_guidance:
  - For general how-to, where-is, setup, and troubleshooting questions, answer with UI steps first.
  - If a matching feature has ui_steps, list those steps before mentioning API endpoints or assistant automation.
  - After UI steps, briefly explain what the feature does and offer to prepare a confirmed action when the request would change oproxy state.
  - For HTTPS setup questions, include proxy address, CA trust, and verification guidance before advanced details.
  - For questions about protocol mix, HTTP/2 or HTTP/3 usage, gRPC/WebSocket counts, or latency percentiles, call get_protocol_metrics instead of estimating from list_sessions.
  - For questions about connection reuse or stream multiplexing, call get_connections.
  - When a breakpoint did not fire, call get_breakpoint_diagnostics to check for tier/body-mode incompatibilities before suggesting rule changes.

workspace_actions:
  - name: navigation.open_surface
    category: ui
    risk: ui_safe
    description: Navigate the authenticated admin UI to a known oproxy surface.
    refreshed_resources: []
    openai_spec:
      type: function
      function:
        name: workspace_navigation_open_surface
        description: Safely switch the oproxy UI to a surface/page. Use for requests like open rules, go to sessions, show settings, or where is the CA screen.
        parameters:
          type: object
          required: [surface]
          properties:
            surface:
              type: string
              enum: [sessions, dashboard, connections, compose, rules, breakpoints, mock, lua, inspector, dns, capture, webhooks, ca, settings]

  - name: sessions.apply_filter
    category: ui
    risk: ui_safe
    description: Update the visible Sessions filters and switch the UI to Sessions.
    refreshed_resources: [sessions]
    openai_spec:
      type: function
      function:
        name: workspace_sessions_apply_filter
        description: Safely update visible Sessions filters. Use when the user asks to show, filter, focus, find, or list captured traffic.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: Search expression such as host:api.test.com, method:GET, status:500, tag:auth, graphql, grpc, or free text.
            regex:
              type: boolean
            methods:
              type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, CONNECT, OPTIONS, HEAD]
            status_buckets:
              type: array
              items:
                type: string
                enum: ["1", "2", "3", "4", "5", "-"]
              description: Use '-' for pending or paused sessions.
            host_focus:
              type: array
              items:
                type: string
            host_filter:
              type: string
            wire_filter:
              type: array
              items:
                type: string
                enum: [h1, h2, h3, socks]
              description: Filter by wire/transport protocol. h1=HTTP/1.1, h2=HTTP/2, h3=HTTP/3, socks=SOCKS5 tunnel.
            app_filter:
              type: array
              items:
                type: string
                enum: [http, ws, grpc, tunnel]
              description: Filter by application protocol. ws=WebSocket, grpc=gRPC, tunnel=TCP tunnels.
            sort:
              type: object
              properties:
                key:
                  type: string
                  enum: [idx, method, status, host, path, type, reqSize, total, ts, protocol]
                dir:
                  type: string
                  enum: [asc, desc]
            view_mode:
              type: string
              enum: [sequence, structure]
            selected_session_id:
              type: string

  - name: sessions.clear_filter
    category: ui
    risk: ui_safe
    description: Clear visible Sessions filters and switch the UI to Sessions.
    refreshed_resources: [sessions]
    openai_spec:
      type: function
      function:
        name: workspace_sessions_clear_filter
        description: Safely clear all visible Sessions filters.
        parameters:
          type: object
          properties: {}

  - name: sessions.select
    category: ui
    risk: ui_sensitive
    description: Select a captured session in the Sessions UI.
    refreshed_resources: [sessions]
    openai_spec:
      type: function
      function:
        name: workspace_sessions_select
        description: Select a specific session by id and open Sessions.
        parameters:
          type: object
          required: [id]
          properties:
            id:
              type: string

  - name: sessions.set_view_mode
    category: ui
    risk: ui_safe
    description: Switch Sessions between sequence and structure view.
    refreshed_resources: []
    openai_spec:
      type: function
      function:
        name: workspace_sessions_set_view_mode
        description: Safely switch Sessions view mode.
        parameters:
          type: object
          required: [view_mode]
          properties:
            view_mode:
              type: string
              enum: [sequence, structure]

  - name: rules.open_tab
    category: ui
    risk: ui_safe
    description: Open the Rules surface and focus a specific tab.
    refreshed_resources: []
    openai_spec:
      type: function
      function:
        name: workspace_rules_open_tab
        description: Safely open the Rules surface and focus a tab. Valid tab values are rules, mapremote, maplocal, fixtures, access, or throttle.
        parameters:
          type: object
          required: [tab]
          properties:
            tab:
              type: string

features:
  - id: sessions
    title: Sessions and Traffic Capture
    category: observe
    purpose: Capture, search, inspect, annotate, diff, export, save, load, and clear HTTP/HTTPS/gRPC/WebSocket/SOCKS sessions.
    ui_steps:
      - Open the Sessions rail item.
      - Use the top search/filter bar to find requests by method, host, path, status, tag, text, wire protocol (HTTP/1.1, H2, H3, SOCKS), or app protocol (HTTP, WS, gRPC, Tunnel).
      - Select a session to inspect request, response, timing, websocket frames, gRPC messages, exports, and replay options.
    use_when:
      - The user asks what happened, why a request failed, or wants to inspect captured traffic.
      - The user wants HAR/JSON export, cURL generation, session import, or saved sessions.
    read_tools: [list_sessions, get_session]
    action_endpoints:
      - /admin/sessions
      - /admin/sessions/save
      - /admin/sessions/load
      - /admin/sessions/import
      - /admin/sessions/export/har
      - /admin/sessions/import/har
    examples:
      - show failed requests
      - summarize calls to api.example.com
      - clear captured sessions
      - export these sessions as HAR
    notes:
      - Session reads are automatic; clearing, importing, loading, saving, and exporting require confirmation.
      - Bodies and sensitive headers must be redacted before model context.
      - Sessions carry protocol identity (downstream protocol, negotiated upstream protocol, connection_id, stream_id) and can be sorted by the protocol column.
      - Streamed exchanges record an event timeline (gRPC messages, WebSocket frames, breakpoint pauses, served mocks, tunnel open/close).

  - id: rewrite_rules
    title: Rewrite Rule Sets
    category: modify
    purpose: Modify matching request/response headers, query params, paths, bodies, hosts, statuses, redirects, or blocks.
    ui_steps:
      - Open the Rules rail item.
      - Choose the Rules tab.
      - Click Add rule.
      - Set Location matching fields such as host, path, method, protocol, query, or port.
      - Add actions such as set/remove header, rewrite path/body, set status, redirect, block, or host change, then save.
    use_when:
      - The user wants to add/remove/change headers, query params, paths, status codes, or body text.
      - The user wants to redirect or block matching traffic with rule logic.
    read_tools: [get_rules]
    action_endpoints: [/admin/rule-sets]
    examples:
      - add header x-debug=true for /api/*
      - remove authorization from requests to staging
      - rewrite /v1/users to /v2/users
      - block requests to /checkout with 503
    notes:
      - Use location to match host/path/method/protocol/query/port; mode is usually glob.
      - Use applies_to=request for request-only actions and response for response-only actions.
      - Prefer propose_rewrite_rule for creating new rewrite rules.

  - id: map_remote
    title: Map Remote
    category: route
    purpose: Route matching traffic to a different upstream origin while preserving the original path and query.
    ui_steps:
      - Open the Rules rail item.
      - Choose the Map Remote tab.
      - Click Add rule.
      - Set the source Location, usually the original host/path to match.
      - Set Destination URL to the upstream origin, then save.
    use_when:
      - The user says map, route, proxy, or forward traffic from one host/service to another.
      - The user wants a frontend to hit production-looking URLs while traffic goes to staging/local.
    read_tools: [get_rules]
    action_endpoints: [/admin/map-remote-rules]
    examples:
      - map api.test.com to google.com
      - route /api traffic from app.local to http://localhost:3000
      - send staging.example.com traffic to https://api.dev.example.com
    notes:
      - Prefer propose_map_remote for host-to-host mapping.
      - Destination is an origin such as https://google.com; path/query are preserved.

  - id: map_local
    title: Map Local
    category: mock
    purpose: Serve matching requests from a local file or directory instead of contacting upstream.
    ui_steps:
      - Open the Rules rail item.
      - Choose the Map Local tab.
      - Click Add rule.
      - Set the Location matcher (host, path, method).
      - "For the Local path: type a file/directory path, or click upload for binary files, or paste to type content inline."
      - Save the rule.
    use_when:
      - The user wants fixture files, static JSON, images, or local assets returned for matching traffic.
      - The user wants offline frontend testing against local responses.
      - The user wants to serve mock data from files instead of typing responses.
    read_tools: [get_rules]
    action_endpoints: [/admin/map-local-rules]
    examples:
      - serve /api/users from users.json
      - map all /assets/* requests to a local directory
      - serve static files for offline testing
    notes:
      - To create a fixture+rule in one step, propose POST /admin/map-local-rules with inline_body (text content); the server writes it to storage/map-local/ and points file_path at it.
      - File mode serves the file verbatim; directory mode appends the request path to find the file inside it.
      - Relative file_path resolves against OPROXY_MAP_LOCAL_BASE_PATH (if set) then storage/map-local/; absolute paths are used verbatim.
      - Prefer inline_body on the rule over raw-body fixture endpoints (those are mainly for uploads/scripts).
      - The Fixtures tab (under Rules → Fixtures) lets users browse, upload, preview, and delete files stored in storage/map-local/.
      - For dynamic responses or sequences, use mock_server instead.

  - id: access_rules
    title: Access Rules
    category: guard
    purpose: Allow or block matching requests before they reach upstream.
    ui_steps:
      - Open the Rules rail item.
      - Choose the Access tab.
      - Click Add rule.
      - Set the Location and choose Block or Allow, then save.
    use_when:
      - The user wants to denylist, allowlist, or block hosts/paths/methods.
      - The user wants to test client behavior when traffic is forbidden.
    read_tools: [get_rules]
    action_endpoints: [/admin/access-rules]
    examples:
      - block analytics.example.com
      - allow only api.example.com
    notes:
      - Block rules return 403 immediately.
      - If allow rules exist, non-matching traffic is blocked.
      - Prefer propose_access_rule for new allow/block rules.

  - id: breakpoints
    title: Breakpoints
    category: debug
    purpose: Pause matching requests or responses so the user can inspect, modify, continue, or drop them. Tiers control what is paused, from headers to whole bodies, individual WebSocket frames / gRPC messages, or SOCKS5 tunnel metadata.
    ui_steps:
      - Open the Breakpoints rail item.
      - Create a request or response breakpoint with matching Location fields.
      - Choose the tier; head pauses on headers/metadata only, body (default) allows full body editing, frame pauses each WebSocket frame or gRPC message, tunnel pauses SOCKS5 tunnel setup.
      - When traffic is held, it appears in a live SSE-driven queue under Pending.
      - Click a pending request to edit headers or body inline, then continue or drop it.
    use_when:
      - The user wants to hold traffic at request/response time.
      - The user wants interactive debugging before forwarding or returning a response.
      - The user wants to pause, edit, or drop individual WebSocket frames or gRPC messages mid-stream.
      - A breakpoint did not fire and the user wants to know why.
    read_tools: [get_rules, get_breakpoint_diagnostics]
    action_endpoints:
      - /admin/breakpoints
      - /admin/breakpoints/pending/{id}/resolve
      - /admin/breakpoints/diagnostics
    examples:
      - pause POST /login requests
      - break on 500 responses from api.example.com
      - pause every WebSocket frame to /socket
      - why did my breakpoint not pause that gRPC stream
    notes:
      - Breakpoint payloads accept a `tier` field (head, body, frame, tunnel); body is the default and only works for buffered bodies.
      - Body-tier breakpoints cannot pause streams, frames, or tunnels; the engine records a diagnostic instead. Use get_breakpoint_diagnostics to surface these mismatches.
      - Frame-tier breakpoints require frame or stream_messages body modes (WebSocket / gRPC); pair them with location wire_protocol/application_protocol/body_mode matchers.
      - Creating breakpoints requires confirmation.
      - Resolving a held breakpoint changes live traffic and requires confirmation.

  - id: mock_server
    title: Mock Responses
    category: mock
    purpose: Return configured mock responses for matching requests. Supports HTTP response variants (rotated), WebSocket frames, gRPC messages, and SOCKS5 tunnel allow/deny.
    ui_steps:
      - Open the Mock Server rail item.
      - Click Add mock.
      - Choose the mock type (HTTP, WebSocket, gRPC, or Tunnel) and set the Location matcher.
      - "For HTTP: add one or more response variants (status, headers, body, delay); variants rotate on successive calls."
      - "For WebSocket: set frame opcode and payload."
      - "For gRPC: set the message payload and optional trailers."
      - "For Tunnel: choose allow or deny for matching SOCKS5 tunnels."
      - Use quick-add presets (200, 404, 500, 401, 429) to prefill common HTTP responses.
      - Save the rule; the call count column shows hits with a proportional bar.
    use_when:
      - The user wants a fake response body/status/headers for an API.
      - The user wants deterministic or sequential (rotating) mock behavior.
      - The user wants to simulate WebSocket, gRPC, or SOCKS5 tunnel responses.
    read_tools: [get_rules]
    action_endpoints:
      - /admin/mock/rules
      - /admin/mock/rules/{id}/reset
    examples:
      - mock GET /users with a 200 JSON response
      - return 429 for /checkout with retry-after header
      - mock a WebSocket connection to /ws
      - mock a gRPC method
    notes:
      - Use mock_server for synthetic responses; use map_local for serving files from disk.
      - Resetting call count requires confirmation.
      - Prefer propose_mock_rule for HTTP response mocks.
      - For WebSocket, gRPC, or Tunnel mocks, use propose_action with the full behavior payload (behavior.type = web_socket_script, grpc_script, or tunnel_decision).
      - "WebSocket script: behavior.frames is an array of {opcode (1=text, 2=binary, 8=close, 9=ping, 10=pong), payload, delay_ms}; match with wire_protocol=websocket, body_mode=frames."
      - "gRPC script: behavior.messages is an array of {payload_base64, compressed, delay_ms}; configured trailers (e.g. grpc-status) are surfaced as response headers and grpc-status defaults to 0. Match with application_protocol=grpc."
      - "Tunnel decision: behavior.decision is {allow: true|false, delay_ms}; applies to SOCKS5 tunnels, match with wire_protocol=socks5, body_mode=tunnel."

  - id: compose_forward
    title: Compose and Forward
    category: network
    purpose: Send manually composed HTTP/gRPC/WebSocket requests through the admin forward endpoint and capture the result.
    ui_steps:
      - Open the Compose rail item.
      - Each compose tab is independent; open multiple tabs for concurrent requests.
      - Enter method, URL, headers, and optional body (or gRPC message, or WebSocket frame).
      - Send the request; the result is captured as an admin-forward session.
      - From Sessions, right-click or use the context menu to open a captured request in Compose for editing or replay.
    use_when:
      - The user wants to send a new request manually.
      - The user wants to replay or tweak a captured request outside the original client.
    read_tools: [list_sessions, get_session]
    action_endpoints: [/admin/forward, /admin/forward/websocket, /admin/playback]
    examples:
      - send a POST to https://api.example.com/login
      - send a gRPC call to pkg.Service/Method
      - send a WebSocket message to wss://echo.example.com and show the replies
      - replay all captured traffic
    notes:
      - Forwarding and playback are outbound network actions and require confirmation.
      - Admin egress policy may block private or loopback targets when remote admin is enabled.
      - "HTTP forward: propose_action POST /admin/forward with method, url, headers, body."
      - "gRPC forward: propose_action POST /admin/forward with kind=grpc, url, and body (the message payload); the body is wrapped in a gRPC frame and sent as POST with content-type application/grpc+proto."
      - "WebSocket forward: propose_action POST /admin/forward/websocket with url (ws:// or wss://), optional headers, and frames (array of {opcode: text|binary|ping|pong|close, payload}); binary payloads are base64. Up to 10 server frames are collected before the socket is closed."

  - id: dns_overrides
    title: DNS Overrides
    category: route
    purpose: Resolve configured hostnames to fixed IP addresses before forwarding.
    ui_steps:
      - Open the DNS Override rail item.
      - Add or edit hostname-to-IP mappings.
      - Save the overrides and send matching traffic through the proxy.
    use_when:
      - The user wants a hostname to resolve to a specific IP.
      - The user is testing DNS cutovers or routing without editing /etc/hosts.
    read_tools: [get_dns]
    action_endpoints:
      - /admin/dns
      - "/admin/dns/{host}"
    examples:
      - resolve api.test.com to 10.0.0.5
      - delete DNS override for api.test.com
    notes:
      - DNS override changes routing but keeps the request host unless other rules modify it.
      - Deleting one host uses DELETE /admin/dns/{host}.
      - Prefer propose_dns_override so one-host changes preserve existing overrides.

  - id: capture_filter
    title: Capture Filter
    category: observe
    purpose: Control which hosts are recorded while proxying continues.
    ui_steps:
      - Open the Capture Filter rail item.
      - Choose allowlist or denylist behavior.
      - Add host patterns and save to control what gets recorded.
    use_when:
      - The user wants to hide noisy hosts from the session list.
      - The user wants to record only selected hosts.
    read_tools: [get_capture_filter]
    action_endpoints: [/admin/capture-filter]
    examples:
      - only capture api.example.com
      - stop recording analytics hosts
    notes:
      - Capture filter affects recording, not forwarding.
      - Use access_rules to block traffic instead.
      - Prefer propose_capture_filter for capture filter changes.

  - id: throttling
    title: Throttling
    category: simulate
    purpose: Add latency and bandwidth limits to simulate slow networks.
    ui_steps:
      - Open the Rules rail item.
      - Choose the Throttling tab.
      - Enable throttling, set latency and bandwidth, then save.
    use_when:
      - The user wants slow response, bandwidth constrained, or poor-network testing.
    read_tools: [get_throttling]
    action_endpoints: [/admin/throttling]
    examples:
      - add 500ms latency
      - limit bandwidth to 128 kbps
    notes:
      - Throttle config is global for matching proxy behavior.
      - Prefer propose_throttling so omitted fields preserve the current throttling config.

  - id: lua_scripts
    title: Lua Scripts
    category: extend
    purpose: Run sandboxed Lua scripts for advanced request/response customization.
    ui_steps:
      - Open the Lua Scripts rail item.
      - Create or edit a script.
      - Enable it and save; use built-in rules instead when they can express the change.
    use_when:
      - The requested transformation is too custom for built-in rewrite rules.
      - The user needs programmable logic inside the proxy.
    read_tools: [get_rules]
    action_endpoints: [/admin/scripts]
    examples:
      - add a Lua script that injects a correlation id
    notes:
      - Scripts are sandboxed and time-limited.
      - Use built-in rules first when they can express the behavior.

  - id: webhooks
    title: Webhooks
    category: integrate
    purpose: Send request_captured or response_captured events to an external URL.
    ui_steps:
      - Open the Webhooks rail item.
      - Add a webhook URL.
      - Choose request_captured and/or response_captured events, optionally set a secret, then save.
    use_when:
      - The user wants oproxy events delivered to another system.
      - The user wants capture notifications or lightweight automation.
    read_tools: [get_webhooks]
    action_endpoints: [/admin/webhooks]
    examples:
      - send request captured webhooks to https://example.com/hook
    notes:
      - Webhook URLs are outbound network destinations and require confirmation.
      - Only request_captured and response_captured are dispatchable events.

  - id: upstream_proxy
    title: Upstream Proxy
    category: route
    purpose: Chain oproxy's outgoing requests through another HTTP proxy.
    ui_steps:
      - Open the Settings rail item.
      - Find Upstream Proxy.
      - Enter the upstream proxy URL or clear it, then save.
    use_when:
      - The user needs corporate proxy chaining, another debugging proxy, or an upstream gateway.
    read_tools: [get_upstream_proxy]
    action_endpoints: [/admin/upstream-proxy]
    examples:
      - set upstream proxy to http://proxy.local:3128
      - clear upstream proxy
    notes:
      - This affects outbound proxy traffic globally.
      - Prefer propose_upstream_proxy for upstream proxy changes.

  - id: https_mitm_ca
    title: HTTPS MITM and Root CA
    category: setup
    purpose: Enable HTTPS inspection by trusting oproxy's generated root CA in the client.
    ui_steps:
      - Configure the client or browser to use oproxy as the HTTP and HTTPS proxy, usually 127.0.0.1:8080 unless your status bar shows a different address.
      - Open the Root CA rail item or visit /admin/ca to download the oproxy CA certificate.
      - Install and trust the CA in the browser, OS, or device trust store.
      - Reload the target app and confirm HTTPS sessions show decrypted request/response details in Sessions.
    use_when:
      - The user cannot see HTTPS bodies.
      - The user asks how to set up browser, mobile, or CLI HTTPS capture.
    read_tools: [get_config]
    action_endpoints: [/admin/ca, /admin/config/reload]
    examples:
      - why are HTTPS bodies empty
      - download the CA certificate
    notes:
      - CA download is a setup/read action; trusting the CA happens on the client/OS.
      - Without client trust, CONNECT traffic may be visible but decrypted HTTP details are not.

  - id: inspectors
    title: Protocol Inspectors
    category: observe
    purpose: Extract useful metadata from JWTs, GraphQL, gRPC, and WebSocket frames.
    ui_steps:
      - Open the Sessions rail item.
      - Select a captured session.
      - Review inspector sections for JWT, GraphQL, gRPC, or WebSocket metadata when present.
    use_when:
      - The user asks about JWT claims, GraphQL operations, gRPC methods, or WebSocket messages.
    read_tools: [list_sessions, get_session]
    action_endpoints: []
    examples:
      - show GraphQL operations
      - inspect websocket frames
      - decode JWT claims
    notes:
      - Inspector data is captured from matching traffic and is read-only.
      - gRPC inspection decodes length-prefixed messages on streaming exchanges and records grpc-status / grpc-message when present.

  - id: protocol_observability
    title: Protocol Observability
    category: observe
    purpose: Understand which wire protocols (HTTP/1.1, HTTP/2, HTTP/3, WebSocket, SOCKS5) and application protocols (HTTP, gRPC, SSE, GraphQL) traffic uses, how connections multiplex streams, and the live protocol/latency mix.
    ui_steps:
      - Open the Sessions rail item; the protocol column shows the negotiated upstream protocol and is sortable.
      - Use the wire/app protocol filters to focus on h1/h2/h3/SOCKS or HTTP/WS/gRPC/Tunnel traffic.
      - Open the Connections rail item to see exchanges grouped by downstream connection with per-stream timelines and peak concurrency.
      - Open the Dashboard rail item for the live protocol mix, sources, status classes, gRPC statuses, bytes, and latency percentiles.
    use_when:
      - The user asks which protocol a request used, whether HTTP/2 or HTTP/3 is being negotiated, or why everything shows HTTP/1.1.
      - The user asks about connection reuse, multiplexing, or concurrent streams.
      - The user wants traffic-wide protocol, latency, or gRPC status statistics.
    read_tools: [get_protocol_metrics, get_connections, list_sessions, get_session]
    action_endpoints: []
    examples:
      - how much of my traffic is HTTP/2
      - show connections with multiplexed streams
      - what is the p95 latency right now
      - how many gRPC calls failed
    notes:
      - Sessions record both the downstream (client→proxy) protocol and the upstream (proxy→origin) negotiated protocol; they can differ.
      - MITM advertises h2 + http/1.1 via ALPN, so HTTP/2 (and gRPC) work through interception; HTTP/3 requires the dedicated UDP listener.
      - HAR exports carry the negotiated protocol and connection/stream identity.
      - This area is read-only; use rules/mocks/breakpoints with wire_protocol, application_protocol, and body_mode matchers to act on specific protocols.

  - id: socks5
    title: SOCKS5 Listener
    category: setup
    purpose: Accept SOCKS5 CONNECT traffic when configured.
    ui_steps:
      - Open the Settings rail item to review runtime config.
      - Check SOCKS5 status if configured.
      - Configure the client to use the SOCKS5 host and port from your oproxy config.
    use_when:
      - The client can use SOCKS but not HTTP proxy settings.
      - The user asks whether SOCKS5 is running.
    read_tools: [get_config]
    action_endpoints: [/admin/socks5/status]
    examples:
      - is SOCKS5 enabled
      - how do I proxy a CLI through SOCKS5
    notes:
      - SOCKS5 status is read-only; listener configuration comes from runtime config.
      - SOCKS5 tunnels are recorded as CONNECT sessions with open/close events and byte counts; TLS tunnels on known TLS ports are MITM-intercepted when enabled.
      - Mock rules with behavior type tunnel_decision can allow or deny matching SOCKS5 tunnels (match on wire_protocol=socks5, body_mode=tunnel).

  - id: http3
    title: HTTP/3 Listener
    category: setup
    purpose: Accept HTTP/3 (QUIC) traffic on a dedicated UDP port and advertise it to clients via Alt-Svc (research preview).
    ui_steps:
      - Build oproxy with the http3 Cargo feature (not enabled in default builds).
      - Set http3_enabled and http3_port in YAML config, or OPROXY_HTTP3_ENABLED / OPROXY_HTTP3_PORT env vars.
      - Restart oproxy; forwarded responses then carry an alt-svc header advertising the h3 port, and clients that trust the oproxy CA can connect over QUIC.
      - Confirm h3 sessions in Sessions via the protocol column or wire-protocol filter.
    use_when:
      - The user asks how to capture or test HTTP/3 / QUIC traffic.
      - The user asks why no h3 sessions appear.
    read_tools: [get_config, get_protocol_metrics]
    action_endpoints: []
    examples:
      - enable HTTP/3
      - why do I see no HTTP/3 traffic
    notes:
      - Requires a binary built with the http3 feature AND http3_enabled + http3_port config; otherwise the listener does not start and config validation warns.
      - HTTP/3 uses UDP, so the port is independent of the TCP proxy port; clients must trust the oproxy CA for QUIC TLS.
      - Listener configuration is config/env only; there is no admin endpoint to toggle it at runtime.

  - id: telemetry
    title: OpenTelemetry Export
    category: integrate
    purpose: Export one OpenTelemetry span per completed exchange, carrying protocol, connection/stream identity, latency, and gRPC status attributes.
    ui_steps:
      - Build oproxy with the otel Cargo feature.
      - Set otel_enabled and otel_endpoint (OTLP collector, e.g. http://localhost:4317) in YAML config or OPROXY_OTEL_ENABLED / OPROXY_OTEL_ENDPOINT env vars.
      - Restart oproxy and watch spans arrive in your collector; group by oproxy.connection_id to reconstruct connections.
    use_when:
      - The user wants proxy traffic visible in an observability stack (Jaeger, Grafana, etc.).
    read_tools: [get_config]
    action_endpoints: []
    examples:
      - export traffic spans to my OTLP collector
    notes:
      - Disabled by default; requires both the otel build feature and otel_enabled config, otherwise validation warns and nothing is exported.
      - Configuration is config/env only; there is no admin endpoint to toggle it at runtime.

  - id: settings
    title: Runtime Settings
    category: setup
    purpose: Read config, reload configuration, and explain listener/auth/storage state.
    ui_steps:
      - Open the Settings rail item.
      - Review listener, auth, MITM, storage, upstream proxy, and runtime state.
      - Use reload config only when you intentionally want to re-read configuration.
    use_when:
      - The user asks how oproxy is running, where data is stored, or whether auth/MITM is enabled.
    read_tools: [get_config]
    action_endpoints: [/admin/config/reload]
    examples:
      - show current config
      - reload config
      - is admin auth enabled
    notes:
      - Reloading config is a mutation and requires confirmation.

tools:
  - name: get_feature_catalog
    category: read
    description: Read the product capability catalog, including features, use cases, read tools, action endpoints, examples, and safety notes.
    openai_spec:
      type: function
      function:
        name: get_feature_catalog
        description: Read oproxy's feature catalog. Use this when deciding which feature, tool, or confirmed action endpoint should satisfy a user request.
        parameters:
          type: object
          properties:
            feature_id:
              type: string
              description: Optional exact feature id, for example map_remote, rewrite_rules, mock_server, dns_overrides, compose_forward, or sessions.
            query:
              type: string
              description: Optional free-text query such as route traffic, block host, mock response, throttle, websocket, or CA.

  - name: list_sessions
    category: read
    description: List captured sessions with optional search and limit.
    openai_spec:
      type: function
      function:
        name: list_sessions
        description: List captured sessions. Bodies are omitted.
        parameters:
          type: object
          properties:
            q:
              type: string
              description: Optional session search query.
            limit:
              type: integer
              minimum: 1
              maximum: 50

  - name: get_session
    category: read
    description: Read one session detail with redacted headers and body previews.
    openai_spec:
      type: function
      function:
        name: get_session
        description: Get one captured session by id with redacted previews.
        parameters:
          type: object
          required: [id]
          properties:
            id:
              type: string

  - name: get_config
    category: read
    description: Read runtime configuration summary.
    openai_spec:
      type: function
      function:
        name: get_config
        description: Read runtime configuration.
        parameters:
          type: object
          properties: {}

  - name: get_rules
    category: read
    description: Read rule sets, map rules, access rules, breakpoints, mocks, and scripts.
    openai_spec:
      type: function
      function:
        name: get_rules
        description: Read oproxy rule resources.
        parameters:
          type: object
          properties:
            resource:
              type: string
              enum: [all, rule_sets, map_remote, map_local, access, breakpoints, mock, scripts]

  - name: get_protocol_metrics
    category: read
    description: Read aggregate protocol metrics over recorded sessions (protocol mix, websocket/gRPC counts, status classes, bytes, latency percentiles).
    openai_spec:
      type: function
      function:
        name: get_protocol_metrics
        description: Read the live protocol dashboard aggregates. Use for questions about protocol mix (HTTP/1.1 vs HTTP/2 vs HTTP/3), WebSocket or gRPC counts, gRPC status distribution, total bytes, or latency percentiles (p50/p95/max).
        parameters:
          type: object
          properties: {}

  - name: get_connections
    category: read
    description: Read the connection-to-stream tree built from recorded exchanges (h2/h3 multiplexing view).
    openai_spec:
      type: function
      function:
        name: get_connections
        description: List recorded downstream connections with their multiplexed streams, peak concurrency, and timing. Use for questions about connection reuse, HTTP/2 or HTTP/3 multiplexing, or which requests shared a connection.
        parameters:
          type: object
          properties:
            limit:
              type: integer
              minimum: 1
              maximum: 20
              description: Maximum connections returned, most recently active first. Default 10.

  - name: get_breakpoint_diagnostics
    category: read
    description: Read recent breakpoint diagnostics explaining why matching rules could not pause traffic.
    openai_spec:
      type: function
      function:
        name: get_breakpoint_diagnostics
        description: Read diagnostics for breakpoint rules whose Location matched but whose tier was incompatible with the traffic (e.g. a body-tier breakpoint on a stream, frame, or tunnel). Use when the user asks why a breakpoint did not fire.
        parameters:
          type: object
          properties: {}

  - name: get_throttling
    category: read
    description: Read throttling config.
    openai_spec:
      type: function
      function:
        name: get_throttling
        description: Read throttling config.
        parameters:
          type: object
          properties: {}

  - name: get_dns
    category: read
    description: Read DNS overrides.
    openai_spec:
      type: function
      function:
        name: get_dns
        description: Read DNS overrides.
        parameters:
          type: object
          properties: {}

  - name: get_capture_filter
    category: read
    description: Read capture filter config.
    openai_spec:
      type: function
      function:
        name: get_capture_filter
        description: Read capture filter.
        parameters:
          type: object
          properties: {}

  - name: get_webhooks
    category: read
    description: Read redacted webhooks.
    openai_spec:
      type: function
      function:
        name: get_webhooks
        description: Read redacted webhooks.
        parameters:
          type: object
          properties: {}

  - name: get_upstream_proxy
    category: read
    description: Read upstream proxy config.
    openai_spec:
      type: function
      function:
        name: get_upstream_proxy
        description: Read upstream proxy config.
        parameters:
          type: object
          properties: {}

  - name: propose_map_remote
    category: mutate
    description: Prepare a Map Remote rule for routing one source host to a destination origin.
    openai_spec:
      type: function
      function:
        name: propose_map_remote
        description: Prepare a confirmed Map Remote rule. Use when the user asks to map, route, proxy, or forward all traffic from one host to another. This creates POST /admin/map-remote-rules, replacing only the upstream origin and preserving path/query.
        parameters:
          type: object
          required: [source_host, destination]
          properties:
            source_host:
              type: string
              description: Original request host to match, for example api.test.com. Do not include a path.
            destination:
              type: string
              description: Destination origin, for example https://google.com or http://localhost:3000.
            name:
              type: string
              description: Optional friendly rule name.

  - name: propose_dns_override
    category: mutate
    description: Prepare a confirmed DNS override change for one host while preserving other overrides.
    openai_spec:
      type: function
      function:
        name: propose_dns_override
        description: Prepare a confirmed DNS override change. Use when the user asks to resolve a hostname to an IP address or delete one DNS override. For set/update, this preserves existing overrides and changes only the requested host.
        parameters:
          type: object
          required: [operation, host]
          properties:
            operation:
              type: string
              enum: [set, delete]
            host:
              type: string
              description: Hostname whose DNS override should be changed, for example api.test.com.
            ip:
              type: string
              description: IP address to use for operation=set, for example 10.0.0.5 or 2001:db8::1.

  - name: propose_throttling
    category: mutate
    description: Prepare a confirmed throttling config change.
    openai_spec:
      type: function
      function:
        name: propose_throttling
        description: Prepare a confirmed throttling change. Use when the user asks to enable, disable, add latency, or set bandwidth throttling. Omitted fields preserve the current throttling config.
        parameters:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether throttling should be enabled. If omitted while latency or bandwidth is set, throttling is enabled.
            latency_ms:
              type: integer
              minimum: 0
              description: Added request latency in milliseconds.
            bandwidth_limit_kbps:
              type: integer
              minimum: 0
              description: Response bandwidth limit in kilobits per second. Use 0 for no bandwidth limit.

  - name: propose_rewrite_rule
    category: mutate
    description: Prepare a confirmed rewrite rule with typed matcher and action fields.
    openai_spec:
      type: function
      function:
        name: propose_rewrite_rule
        description: Prepare a confirmed rewrite rule. Use for header/query/path/body/status/redirect/block transformations instead of broad propose_action.
        parameters:
          type: object
          required: [actions]
          properties:
            name:
              type: string
            enabled:
              type: boolean
            applies_to:
              type: string
              enum: [request, response, both]
            host:
              type: string
            path:
              type: string
            methods:
              type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, CONNECT, OPTIONS, HEAD]
            protocol:
              type: string
              enum: [http, https]
            wire_protocol:
              type: string
              enum: [http1, http2, http3, websocket, socks5]
            application_protocol:
              type: string
              enum: [http, grpc, sse, graphql, json, binary]
            body_mode:
              type: string
              enum: [empty, full, stream_bytes, stream_messages, frames, tunnel]
            port:
              type: integer
              minimum: 0
              maximum: 65535
            query:
              type: string
            mode:
              type: string
              enum: [glob, regex]
            location:
              type: object
              description: Optional full Location object; top-level matcher fields override matching fields inside this object.
            actions:
              type: array
              minItems: 1
              items:
                type: object
                required: [type]
                properties:
                  type:
                    type: string
                    enum: [set_header, append_header, remove_header, set_query_param, remove_query_param, set_host, set_path, set_status, replace_body, redirect, block]
                  name:
                    type: string
                  value:
                    type: string
                  pattern:
                    type: string
                  replacement:
                    type: string
                  code:
                    type: integer
                    minimum: 100
                    maximum: 599
                  status:
                    type: integer
                    minimum: 100
                    maximum: 599
                  location:
                    type: string
                    description: Redirect destination for redirect actions.

  - name: propose_mock_rule
    category: mutate
    description: Prepare a confirmed mock response rule.
    openai_spec:
      type: function
      function:
        name: propose_mock_rule
        description: Prepare a confirmed HTTP mock response rule (http_response type). Use for HTTP status/headers/body mocks with optional multi-variant rotation. For WebSocket, gRPC, or tunnel mocks use propose_action with a full behavior payload instead.
        parameters:
          type: object
          properties:
            name:
              type: string
            enabled:
              type: boolean
            host:
              type: string
            path:
              type: string
            methods:
              type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, CONNECT, OPTIONS, HEAD]
            protocol:
              type: string
              enum: [http, https]
            wire_protocol:
              type: string
              enum: [http1, http2, http3, websocket, socks5]
            application_protocol:
              type: string
              enum: [http, grpc, sse, graphql, json, binary]
            body_mode:
              type: string
              enum: [empty, full, stream_bytes, stream_messages, frames, tunnel]
            port:
              type: integer
              minimum: 0
              maximum: 65535
            query:
              type: string
            mode:
              type: string
              enum: [glob, regex]
            location:
              type: object
              description: Optional full Location object; top-level matcher fields override matching fields inside this object.
            status:
              type: integer
              minimum: 100
              maximum: 599
              description: Single mock response status when responses is omitted.
            headers:
              type: object
              additionalProperties:
                type: string
            content_type:
              type: string
              description: Convenience content-type header when responses is omitted.
            body:
              type: string
              description: Single mock response body when responses is omitted.
            delay_ms:
              type: integer
              minimum: 0
            responses:
              type: array
              minItems: 1
              items:
                type: object
                required: [status, headers, body]
                properties:
                  status:
                    type: integer
                    minimum: 100
                    maximum: 599
                  headers:
                    type: object
                    additionalProperties:
                      type: string
                  body:
                    type: string
                  delay_ms:
                    type: integer
                    minimum: 0

  - name: propose_access_rule
    category: mutate
    description: Prepare a confirmed access allow/block rule.
    openai_spec:
      type: function
      function:
        name: propose_access_rule
        description: Prepare a confirmed access rule. Use when the user asks to block, deny, allow, or allowlist matching traffic.
        parameters:
          type: object
          required: [action]
          properties:
            action:
              type: string
              enum: [block, allow]
            name:
              type: string
            enabled:
              type: boolean
            host:
              type: string
            path:
              type: string
            methods:
              type: array
              items:
                type: string
                enum: [GET, POST, PUT, PATCH, DELETE, CONNECT, OPTIONS, HEAD]
            protocol:
              type: string
              enum: [http, https]
            wire_protocol:
              type: string
              enum: [http1, http2, http3, websocket, socks5]
            application_protocol:
              type: string
              enum: [http, grpc, sse, graphql, json, binary]
            body_mode:
              type: string
              enum: [empty, full, stream_bytes, stream_messages, frames, tunnel]
            port:
              type: integer
              minimum: 0
              maximum: 65535
            query:
              type: string
            mode:
              type: string
              enum: [glob, regex]
            location:
              type: object
              description: Optional full Location object; top-level matcher fields override matching fields inside this object.

  - name: propose_capture_filter
    category: mutate
    description: Prepare a confirmed capture filter config change.
    openai_spec:
      type: function
      function:
        name: propose_capture_filter
        description: Prepare a confirmed capture filter change. Use when the user asks to record only certain hosts, stop recording certain hosts, or record all traffic again.
        parameters:
          type: object
          required: [mode]
          properties:
            mode:
              type: string
              enum: [disabled, allowlist, denylist]
              description: disabled records all traffic; allowlist records only hosts; denylist skips matching hosts.
            hosts:
              type: array
              items:
                type: string
              description: Host substrings/patterns used by allowlist or denylist mode.

  - name: propose_upstream_proxy
    category: mutate
    description: Prepare a confirmed upstream proxy change.
    openai_spec:
      type: function
      function:
        name: propose_upstream_proxy
        description: Prepare a confirmed upstream proxy change. Use when the user asks to chain oproxy through another proxy or clear proxy chaining.
        parameters:
          type: object
          properties:
            upstream_proxy:
              type: string
              description: Proxy URL such as http://proxy.local:3128. Use null to clear.
            proxy:
              type: string
              description: Alias for upstream_proxy.

  - name: propose_action
    category: mutate
    description: Prepare an allowlisted admin action that must be confirmed by the user.
    openai_spec:
      type: function
      function:
        name: propose_action
        description: Prepare an allowlisted admin action that needs user confirmation. Use this for mutations that do not have a specialized propose_* tool. Prefer propose_map_remote for host-to-host traffic mapping, propose_dns_override for DNS changes, propose_throttling for throttling changes, propose_rewrite_rule for rewrite rules, propose_mock_rule for mock responses, propose_access_rule for access rules, propose_capture_filter for capture filtering, and propose_upstream_proxy for upstream proxy changes.
        parameters:
          type: object
          required: [method, endpoint, summary, payload]
          properties:
            method:
              type: string
              enum: [POST, PUT, DELETE]
            endpoint:
              type: string
              description: "Allowlisted oproxy admin endpoint path. Allowed bases: /admin/rule-sets, /admin/map-remote-rules, /admin/map-local-rules, /admin/access-rules, /admin/throttling, /admin/breakpoints, /admin/mock/rules, /admin/scripts, /admin/dns, /admin/capture-filter, /admin/upstream-proxy, /admin/webhooks, /admin/forward, /admin/forward/websocket, /admin/playback, /admin/sessions. PUT/DELETE may append /{id}."
            summary:
              type: string
            payload:
              type: object
